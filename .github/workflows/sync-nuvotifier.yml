name: Sync NuVotifier

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodule
        run: |
          cd libs/nuvotifier
          git fetch origin main
          git checkout main
          git merge origin/main --no-edit || true

      - name: Commit and push
        if: success()
        run: |
          git config --global user.email "ci@8b8t.dev"
          git config --global user.name "GitHub Actions"
          git add libs/nuvotifier
          git diff --staged --quiet || git commit -m "Update NuVotifier submodule"
          git push origin main